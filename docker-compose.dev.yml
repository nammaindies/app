services:
  db:
    # Base image: pgvector/pgvector:pg16 (Postgres 16 + pgvector, Debian bookworm),
    # with PostGIS layered on top via docker/db/Dockerfile using bookworm's
    # postgresql-16-postgis-3 apt package -- this direction (pgvector base +
    # apt-installed postgis) built cleanly and quickly, whereas the reverse
    # (postgis/postgis base + compiling pgvector from source) hit no matching
    # apt package for pgvector and a slow/flaky from-source build.
    build:
      context: ./docker/db
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: indiedex
    ports:
      - "5432:5432"
    volumes:
      - indiedex_db_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - indiedex_minio_data:/data

volumes:
  indiedex_db_data:
  indiedex_minio_data:
